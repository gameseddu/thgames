<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body, html { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050810; 
            margin: 0; padding: 0;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            width: fit-content;
            margin: 0 auto;
        }

        @media (max-width: 450px) {
            .game-grid {
                grid-template-columns: repeat(3, 85px);
                grid-template-rows: repeat(3, 85px);
            }
        }

        .cell-btn {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            height: 100%;
            padding: 0;
            line-height: 0;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.02);
        }

        .cell-btn:hover:not(:disabled) {
            background: rgba(51, 65, 85, 0.6);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.3);
        }

        .winning-cell {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: rgba(16, 185, 129, 0.5) !important;
            color: #10b981 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
            transform: scale(1.05);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        @keyframes win-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1.05); }
        }

        /* Animação de pulo contínua */
        @keyframes trophy-jump {
            0%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-12px) scale(1.05); }
            60% { transform: translateY(-6px) scale(1.02); }
        }

        .animate-jump {
            animation: trophy-jump 1.5s infinite ease-in-out;
        }

        .animate-win {
            animation: win-pop 0.5s ease-out forwards;
        }

        .ai-typing::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const translations = {
            pt: {
                subtitle: "TIC TAC TOE",
                scoreboard: "Placar",
                you: "VEZ DE \"X\"",
                ia: "VEZ DE \"O\"",
                aiState: "IA Inteligente",
                on: "ON",
                off: "OFF",
                speed: "Tempo de Resposta",
                clearTable: "Limpar Mesa",
                resetPoints: "Zerar Pontos",
                supportTitle: "⭐ Apoiar Projeto",
                supportSubtitle: "Mantenha o jogo vivo.",
                contributeBtn: "APOIAR AGORA",
                contact: "Desenvolvedor",
                pixTitle: "Apoio via PIX",
                pixKeyLabel: "Chave PIX",
                copyBtn: "Copiar Chave",
                copiedBtn: "Copiado!",
                grandChampion: "GRANDE CAMPEÃO!",
                grandMsg: "O jogador {player} ganhou o jogo ao atingir 3 pontos!",
                langBtn: "EN 🇺🇸"
            },
            en: {
                subtitle: "TIC TAC TOE",
                scoreboard: "Scoreboard",
                you: "TURN OF \"X\"",
                ia: "TURN OF \"O\"",
                aiState: "Smart AI",
                on: "ON",
                off: "OFF",
                speed: "Response Time",
                clearTable: "Clear Board",
                resetPoints: "Reset Scores",
                supportTitle: "⭐ Support Project",
                supportSubtitle: "Keep the game alive.",
                contributeBtn: "SUPPORT NOW",
                contact: "Developer",
                pixTitle: "Support via PIX",
                pixKeyLabel: "PIX Key",
                copyBtn: "Copy Key",
                copiedBtn: "Copied!",
                grandChampion: "GRAND CHAMPION!",
                grandMsg: "Player {player} won the game by reaching 3 points!",
                langBtn: "PT 🇧🇷"
            }
        };

        function App() {
            const [lang, setLang] = useState('pt');
            const t = translations[lang];

            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 600 });
            const [isAiThinking, setIsAiThinking] = useState(false);
            
            const [showSupport, setShowSupport] = useState(false);
            const [showGrandModal, setShowGrandModal] = useState(false);
            const [grandWinnerName, setGrandWinnerName] = useState("");
            const [copySuccess, setCopySuccess] = useState(false);

            const toggleLang = () => setLang(prev => prev === 'pt' ? 'en' : 'pt');

            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (tempBoard.every(s => s !== null)) return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !isAiThinking && !showGrandModal) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                        if (available.length === 0) { setIsAiThinking(false); return; }
                        
                        let move;
                        if (aiConfig.difficulty === 5) {
                            let bestScore = -Infinity;
                            for (let i of available) {
                                let tempBoard = [...board];
                                tempBoard[i] = 'O';
                                let score = minimax(tempBoard, 0, false);
                                if (score > bestScore) { bestScore = score; move = i; }
                            }
                        } else {
                            move = available[Math.floor(Math.random() * available.length)];
                        }
                        if (move !== undefined) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, board, minimax, aiConfig.speed, showGrandModal]);

            const resetTable = () => { 
                setBoard(Array(9).fill(null)); 
                setXMoves([]); 
                setOMoves([]); 
                setRoundWinner(null); 
                setIsXNext(true); 
            };
            
            const resetScores = () => { 
                resetTable(); 
                setScores({ X: 0, O: 0 }); 
            };

            const handlePlay = (i) => {
                if (board[i] || roundWinner || showGrandModal) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    const newScores = { ...scores, [win.player]: scores[win.player] + 1 };
                    setScores(newScores);
                    
                    if (newScores[win.player] >= 3) {
                        setGrandWinnerName(win.player);
                        setTimeout(() => {
                            setShowGrandModal(true);
                            setTimeout(() => {
                                setShowGrandModal(false);
                                resetScores();
                            }, 4000);
                        }, 800);
                    } else {
                        setTimeout(() => {
                            resetTable();
                        }, 2000);
                    }
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const copyPix = () => {
                const pix = "11837922985";
                const el = document.createElement('textarea');
                el.value = pix;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen py-8 px-4 space-y-8">
                    
                    <div className="text-center space-y-1">
                        <h1 className="text-4xl md:text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-emerald-400 to-blue-500 uppercase tracking-tighter drop-shadow-sm">
                            Infinito
                        </h1>
                        <p className="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-bold opacity-80">{t.subtitle}</p>
                    </div>

                    <div className="flex flex-col lg:flex-row items-center lg:items-stretch justify-center gap-6 w-full max-w-[1100px]">
                        
                        {/* Coluna Esquerda: Placar */}
                        <div className="w-full max-w-[324px] lg:w-72 flex flex-col gap-4">
                            <button onClick={toggleLang} className="w-full py-3 glass-panel hover:bg-white/5 text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                {t.langBtn}
                            </button>

                            <div className="glass-panel p-5 space-y-4 flex-1">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-1 border-b border-white/5 pb-2">{t.scoreboard}</h3>
                                <div className="space-y-3">
                                    <div className={`p-4 rounded-2xl flex items-center justify-between transition-all ${isXNext && !roundWinner ? 'bg-blue-500/10 border border-blue-500/20' : 'bg-white/5 opacity-60'}`}>
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-black text-blue-400 mb-1">{t.you}</span>
                                            <span className="text-xl font-black text-blue-400">X</span>
                                        </div>
                                        <span className="text-3xl font-black">{scores.X}</span>
                                    </div>
                                    <div className={`p-4 rounded-2xl flex items-center justify-between transition-all ${!isXNext && !roundWinner ? 'bg-rose-500/10 border border-rose-500/20' : 'bg-white/5 opacity-60'}`}>
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-black text-rose-400 mb-1">{t.ia}</span>
                                            <span className="text-xl font-black text-rose-400">O</span>
                                        </div>
                                        <span className="text-3xl font-black">{scores.O}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel p-5 space-y-4">
                                <div className="flex justify-between items-center">
                                    <span className="text-[10px] font-black uppercase text-slate-400">{t.aiState}</span>
                                    <button 
                                        onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})}
                                        className={`px-4 py-1.5 rounded-full text-[9px] font-bold uppercase transition-all ${aiConfig.enabled ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}
                                    >
                                        {aiConfig.enabled ? t.on : t.off}
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-black uppercase text-slate-500">{t.speed}</span>
                                        <span className="text-[10px] font-mono font-bold text-blue-400">{aiConfig.speed}ms</span>
                                    </div>
                                    <input 
                                        type="range" min="100" max="1500" step="100" 
                                        disabled={!aiConfig.enabled}
                                        value={aiConfig.speed} 
                                        onChange={(e) => setAiConfig({...aiConfig, speed: parseInt(e.target.value)})}
                                        className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none accent-blue-500"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Coluna Central: Jogo */}
                        <div className="w-full max-w-[324px] md:max-w-none flex flex-col gap-4">
                            <div className="glass-panel p-6 shadow-2xl flex flex-col items-center justify-center flex-1 min-h-[400px]">
                                <div className="game-grid">
                                    {board.map((cell, i) => {
                                        const isWin = roundWinner?.line.includes(i);
                                        const isFading = !roundWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                        return (
                                            <button key={i} onClick={() => handlePlay(i)} disabled={cell !== null || roundWinner || isAiThinking}
                                                className={`cell-btn ${isWin ? 'winning-cell animate-win' : ''}`}>
                                                <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-20 blur-[2px]' : 'opacity-100'} transition-all duration-500`}>
                                                    {cell}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                                {isAiThinking && (
                                    <div className="mt-6 text-[10px] font-black uppercase tracking-widest text-slate-500 ai-typing">
                                        IA Pensando
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex gap-3">
                                <button onClick={resetScores} className="flex-1 py-4 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 rounded-2xl text-[10px] font-black uppercase transition-all border border-rose-500/10">
                                    {t.resetPoints}
                                </button>
                                <button onClick={resetTable} className="flex-1 py-4 bg-slate-800/80 hover:bg-slate-700 rounded-2xl text-[10px] font-black uppercase transition-all border border-white/5">
                                    {t.clearTable}
                                </button>
                            </div>
                        </div>

                        {/* Coluna Direita: Suporte */}
                        <div className="w-full max-w-[324px] lg:w-72 flex flex-col gap-4">
                            <div className="glass-panel p-6 bg-gradient-to-br from-amber-500/10 via-transparent to-transparent border-amber-500/20 flex-1 flex flex-col justify-center text-center">
                                <div className="p-3 bg-amber-500/20 rounded-2xl text-amber-500 w-fit mx-auto mb-4 animate-jump">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                                </div>
                                <h4 className="text-amber-400 text-xs font-black uppercase tracking-widest mb-2">{t.supportTitle}</h4>
                                <p className="text-[10px] text-slate-400 leading-relaxed mb-6">{t.supportSubtitle}</p>
                                <button onClick={() => setShowSupport(true)} className="w-full py-4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black rounded-2xl text-[10px] uppercase shadow-lg shadow-amber-500/10 active:scale-95 transition-all">
                                    {t.contributeBtn}
                                </button>
                            </div>

                            <div className="glass-panel p-6 space-y-4">
                                <h4 className="text-blue-400 text-[10px] font-black uppercase tracking-widest border-b border-white/5 pb-2">{t.contact}</h4>
                                <div className="space-y-4">
                                    <a href="https://www.instagram.com/rafael.hpk" target="_blank" className="flex items-center gap-3 group">
                                        <div className="p-2.5 bg-gradient-to-tr from-purple-600 to-rose-500 rounded-xl text-white group-hover:scale-110 transition-transform">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/></svg>
                                        </div>
                                        <span className="text-[11px] font-bold text-slate-300">@rafael.hpk</span>
                                    </a>
                                    <div className="flex items-center gap-3">
                                        <div className="p-2.5 bg-slate-800 rounded-xl text-blue-400 border border-white/5">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-400 truncate">contato.th047@gmail.com</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Modal de Grande Campeão */}
                    {showGrandModal && (
                        <div className="modal-overlay">
                            <div className="glass-panel bg-slate-950 border-amber-500/50 w-full max-w-sm p-10 rounded-[3rem] shadow-[0_0_70px_rgba(245,158,11,0.3)] text-center animate-in zoom-in duration-500">
                                <div className="w-24 h-24 bg-amber-500/20 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6 animate-jump">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                                </div>
                                <h2 className="text-amber-400 font-black uppercase text-3xl tracking-tighter mb-4">{t.grandChampion}</h2>
                                <p className="text-slate-300 text-sm leading-relaxed mb-6">
                                    {t.grandMsg.replace('{player}', grandWinnerName)}
                                </p>
                                <div className="text-[10px] font-black text-amber-500/50 uppercase tracking-[0.3em]">Reiniciando...</div>
                            </div>
                        </div>
                    )}

                    {/* Modal de Suporte */}
                    {showSupport && (
                        <div className="modal-overlay" onClick={() => setShowSupport(false)}>
                            <div className="glass-panel bg-slate-900 border-slate-700 w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowSupport(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                </button>
                                <div className="text-center space-y-6">
                                    <h2 className="text-amber-400 font-black uppercase text-sm tracking-[0.2em]">{t.pixTitle}</h2>
                                    <div className="w-40 h-40 bg-white p-3 rounded-3xl mx-auto flex items-center justify-center animate-jump">
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1e293b" strokeWidth="1.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h2v2H7zM15 7h2v2h-2zM7 15h2v2H7zM15 15h2v2h-2z"/></svg>
                                    </div>
                                    <div className="bg-black/40 p-4 rounded-2xl border border-white/5 space-y-2">
                                        <span className="text-[11px] font-bold text-blue-400">11837922985</span>
                                        <button onClick={copyPix} className={`w-full py-3 rounded-xl text-[10px] font-black uppercase transition-all ${copySuccess ? 'bg-emerald-500' : 'bg-blue-600'}`}>
                                            {copySuccess ? t.copiedBtn : t.copyBtn}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
