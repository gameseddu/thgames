<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body, html { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0f1e; 
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow-x: hidden;
            color: white;
        }

        #root { min-height: 100%; width: 100%; }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0f1e; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .cell-btn {
            background: #161e2d;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
        }

        .cell-btn:hover:not(:disabled) {
            background: #1e293b;
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.1);
        }

        .cell-btn:active { transform: scale(0.95); }

        .score-card {
            transition: all 0.3s ease;
        }

        .score-card.active {
            transform: scale(1.05);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }

        @keyframes win-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .winning-cell {
            animation: win-pulse 1.5s infinite;
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: #10b981 !important;
            color: #10b981 !important;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            // Estado do Jogo
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0, ties: 0 });
            
            // Configurações
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 500 });
            const [isAiThinking, setIsAiThinking] = useState(false);

            // Logica de Vitória
            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                if (squares.every(s => s !== null)) return { player: 'Tie', line: [] };
                return null;
            }, []);

            // IA Minimax
            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (result?.player === 'Tie') return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            // Turno da IA
            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                        let move;
                        if (aiConfig.difficulty === 5) {
                            let bestScore = -Infinity;
                            for (let i of available) {
                                let tempBoard = [...board];
                                tempBoard[i] = 'O';
                                let score = minimax(tempBoard, 0, false);
                                if (score > bestScore) { bestScore = score; move = i; }
                            }
                        } else {
                            move = available[Math.floor(Math.random() * available.length)];
                        }
                        if (move !== undefined) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, board, minimax]);

            const handlePlay = (i) => {
                if (board[i] || roundWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    if (win.player === 'Tie') {
                        setScores(prev => ({ ...prev, ties: prev.ties + 1 }));
                    } else {
                        setScores(prev => ({ ...prev, [win.player]: prev[win.player] + 1 }));
                    }
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetTable = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); setIsXNext(true); };
            const resetScores = () => { resetTable(); setScores({ X: 0, O: 0, ties: 0 }); };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 md:p-8 space-y-8">
                    
                    {/* Header e Logo */}
                    <div className="text-center space-y-2">
                        <h1 className="text-4xl md:text-6xl font-extrabold tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase">
                            Infinito
                        </h1>
                        <p className="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-bold">Jogo da Velha Dinâmico</p>
                    </div>

                    {/* Layout Principal: Placar + Jogo */}
                    <div className="flex flex-col lg:flex-row items-center lg:items-start justify-center gap-8 w-full max-w-6xl">
                        
                        {/* Tabuleiro (Centro) */}
                        <div className="w-full max-w-[400px] space-y-6">
                            <div className="flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <div className={`w-2 h-2 rounded-full ${isAiThinking ? 'bg-emerald-400 animate-ping' : 'bg-slate-600'}`}></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">
                                        {isAiThinking ? 'IA a pensar...' : roundWinner ? 'Fim de Jogo' : `Vez do ${isXNext ? 'X' : 'O'}`}
                                    </span>
                                </div>
                                <div className="px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                                    <span className="text-[9px] font-black text-blue-400 uppercase">Dificuldade: Máxima</span>
                                </div>
                            </div>

                            <div className="glass-panel p-4 shadow-2xl">
                                <div className="game-grid">
                                    {board.map((cell, i) => {
                                        const isWin = roundWinner?.line.includes(i);
                                        const isFading = !roundWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                        return (
                                            <button key={i} onClick={() => handlePlay(i)} disabled={cell !== null || roundWinner || isAiThinking}
                                                className={`cell-btn ${isWin ? 'winning-cell' : ''}`}>
                                                <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-10 blur-[2px]' : 'opacity-100'}`}>
                                                    {cell}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Controles de Mesa */}
                            <div className="flex gap-3">
                                <button onClick={resetTable} className="flex-1 py-4 bg-[#1e293b] hover:bg-[#2d3a4f] rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/5 shadow-lg active:scale-95">
                                    Limpar Mesa
                                </button>
                                <button onClick={resetScores} className="flex-1 py-4 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border border-rose-500/20 active:scale-95">
                                    Zerar Pontos
                                </button>
                            </div>
                        </div>

                        {/* Placar (Lado Direito / Embaixo no Mobile) */}
                        <div className="w-full max-w-[400px] lg:max-w-[280px] space-y-4">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-2">Estatísticas</h3>
                            <div className="grid grid-cols-1 gap-3">
                                <div className={`glass-panel p-5 flex items-center justify-between score-card ${isXNext && !roundWinner ? 'active' : ''}`}>
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-400 font-black">X</div>
                                        <span className="text-xs font-bold text-slate-300">Jogador</span>
                                    </div>
                                    <span className="text-2xl font-black">{scores.X}</span>
                                </div>
                                
                                <div className={`glass-panel p-5 flex items-center justify-between score-card ${!isXNext && !roundWinner ? 'active' : ''}`}>
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-rose-500/20 rounded-xl flex items-center justify-center text-rose-400 font-black">O</div>
                                        <span className="text-xs font-bold text-slate-300">Inteligência</span>
                                    </div>
                                    <span className="text-2xl font-black">{scores.O}</span>
                                </div>

                                <div className="glass-panel p-5 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-slate-500/20 rounded-xl flex items-center justify-center text-slate-400 font-black">=</div>
                                        <span className="text-xs font-bold text-slate-300">Empates</span>
                                    </div>
                                    <span className="text-2xl font-black">{scores.ties}</span>
                                </div>
                            </div>

                            {/* Seção Apoiar */}
                            <div className="glass-panel p-6 bg-gradient-to-br from-amber-500/10 to-orange-600/10 border-amber-500/20">
                                <h4 className="text-amber-400 text-[10px] font-black uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                    Apoiar Projeto
                                </h4>
                                <p className="text-[11px] text-slate-400 mb-4 leading-relaxed">Gostou do jogo? Ajude-nos a manter o servidor e criar novos níveis!</p>
                                <button className="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black rounded-xl text-[10px] uppercase tracking-tighter transition-all shadow-lg shadow-amber-500/20 active:scale-95">
                                    Contribuir agora
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Card de Contato Profissional */}
                    <div className="w-full max-w-6xl px-4 pb-8">
                        <div className="glass-panel p-6 md:p-8 flex flex-col md:flex-row items-center justify-between gap-6 hover:border-blue-500/30 transition-colors">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center shadow-xl">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                </div>
                                <div className="text-center md:text-left">
                                    <h2 className="text-xl font-extrabold text-white">Contato Profissional</h2>
                                    <p className="text-slate-400 text-sm">Disponível para novos projetos e colaborações</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-4">
                                <a href="mailto:contato.th047@gmail.com" className="flex items-center gap-3 px-5 py-3 bg-slate-800/50 hover:bg-slate-700 rounded-xl border border-white/5 transition-all group">
                                    <div className="text-blue-400 group-hover:scale-110 transition-transform">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                    </div>
                                    <span className="text-xs font-bold">contato.th047@gmail.com</span>
                                </a>
                                <div className="flex gap-2">
                                    <button className="p-3 bg-slate-800/50 hover:bg-[#0077b5] rounded-xl border border-white/5 transition-all text-slate-400 hover:text-white">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                                    </button>
                                    <button className="p-3 bg-slate-800/50 hover:bg-white hover:text-black rounded-xl border border-white/5 transition-all text-slate-400">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
