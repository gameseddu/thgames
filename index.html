<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body, html { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0f1e; 
            margin: 0; padding: 0;
            color: white;
            /* Garante que o conteúdo caiba na tela sem F11 */
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 380px; /* Reduzido para caber melhor em telas menores */
            aspect-ratio: 1 / 1;
        }

        .cell-btn {
            background: #161e2d;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            font-weight: 800;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .cell-btn:hover:not(:disabled) {
            background: #1e293b;
            transform: scale(1.02);
        }

        .winning-cell {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            color: #10b981 !important;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Estilo para o controle de velocidade */
        input[type=range] {
            accent-color: #3b82f6;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0, ties: 0 });
            
            // Configurações de IA
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 600 });
            const [isAiThinking, setIsAiThinking] = useState(false);

            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                if (squares.every(s => s !== null)) return { player: 'Tie', line: [] };
                return null;
            }, []);

            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (result?.player === 'Tie') return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                        let move;
                        if (aiConfig.difficulty === 5) {
                            let bestScore = -Infinity;
                            for (let i of available) {
                                let tempBoard = [...board];
                                tempBoard[i] = 'O';
                                let score = minimax(tempBoard, 0, false);
                                if (score > bestScore) { bestScore = score; move = i; }
                            }
                        } else {
                            move = available[Math.floor(Math.random() * available.length)];
                        }
                        if (move !== undefined) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, board, minimax, aiConfig.speed]);

            const handlePlay = (i) => {
                if (board[i] || roundWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    if (win.player === 'Tie') {
                        setScores(prev => ({ ...prev, ties: prev.ties + 1 }));
                    } else {
                        setScores(prev => ({ ...prev, [win.player]: prev[win.player] + 1 }));
                    }
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetTable = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); setIsXNext(true); };
            const resetScores = () => { resetTable(); setScores({ X: 0, O: 0, ties: 0 }); };

            return (
                <div className="flex flex-col items-center justify-start min-h-screen py-6 px-4 space-y-6">
                    
                    {/* Header */}
                    <div className="text-center">
                        <h1 className="text-3xl md:text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter">
                            Infinito
                        </h1>
                        <p className="text-[9px] uppercase tracking-[0.3em] text-slate-500 font-bold">TIC TAC TOE</p>
                    </div>

                    {/* Container Principal: Placar na Esquerda + Jogo */}
                    <div className="flex flex-col lg:flex-row items-center lg:items-start justify-center gap-6 w-full max-w-5xl">
                        
                        {/* Placar (Esquerda no Desktop) */}
                        <div className="w-full max-w-[320px] lg:w-64 space-y-4">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-1">Placar</h3>
                            <div className="space-y-2">
                                <div className={`glass-panel p-4 flex items-center justify-between border-l-4 ${isXNext && !roundWinner ? 'border-l-blue-500 bg-blue-500/5' : 'border-l-transparent'}`}>
                                    <span className="text-xs font-bold text-blue-400">JOGADOR (X)</span>
                                    <span className="text-xl font-black">{scores.X}</span>
                                </div>
                                <div className={`glass-panel p-4 flex items-center justify-between border-l-4 ${!isXNext && !roundWinner ? 'border-l-rose-500 bg-rose-500/5' : 'border-l-transparent'}`}>
                                    <span className="text-xs font-bold text-rose-400">IA (O)</span>
                                    <span className="text-xl font-black">{scores.O}</span>
                                </div>
                                <div className="glass-panel p-4 flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-400">EMPATES</span>
                                    <span className="text-xl font-black">{scores.ties}</span>
                                </div>
                            </div>

                            {/* Velocidade da IA */}
                            <div className="glass-panel p-4 space-y-3">
                                <div className="flex justify-between items-center">
                                    <span className="text-[10px] font-black uppercase text-slate-400">Velocidade IA</span>
                                    <span className="text-[10px] font-mono text-blue-400">{aiConfig.speed}ms</span>
                                </div>
                                <input 
                                    type="range" min="100" max="2000" step="100" 
                                    value={aiConfig.speed} 
                                    onChange={(e) => setAiConfig({...aiConfig, speed: parseInt(e.target.value)})}
                                    className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none"
                                />
                                <p className="text-[9px] text-slate-500 text-center italic">Arraste para ajustar a reação da IA</p>
                            </div>
                        </div>

                        {/* Jogo (Centro) */}
                        <div className="w-full max-w-[380px] space-y-4">
                            <div className="glass-panel p-4 shadow-xl">
                                <div className="game-grid">
                                    {board.map((cell, i) => {
                                        const isWin = roundWinner?.line.includes(i);
                                        const isAboutToVanish = !roundWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                        return (
                                            <button key={i} onClick={() => handlePlay(i)} disabled={cell !== null || roundWinner || isAiThinking}
                                                className={`cell-btn ${isWin ? 'winning-cell' : ''}`}>
                                                <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isAboutToVanish ? 'opacity-20 blur-[1px]' : 'opacity-100'}`}>
                                                    {cell}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={resetTable} className="flex-1 py-3 bg-[#1e293b] hover:bg-slate-700 rounded-xl text-[10px] font-black uppercase transition-all">Limpar</button>
                                <button onClick={resetScores} className="flex-1 py-3 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 rounded-xl text-[10px] font-black uppercase transition-all border border-rose-500/20">Zerar</button>
                            </div>
                        </div>

                        {/* Lateral Direita: Apoiar + Contato */}
                        <div className="w-full max-w-[320px] lg:w-64 space-y-4">
                            <div className="glass-panel p-5 bg-gradient-to-br from-amber-500/10 to-orange-600/10 border-amber-500/30">
                                <h4 className="text-amber-400 text-[10px] font-black uppercase tracking-widest mb-2 flex items-center gap-2">
                                    <span className="text-lg">⭐</span> APOIAR PROJETO
                                </h4>
                                <p className="text-[10px] text-slate-300 mb-4 leading-relaxed">Ajude-nos a criar mais jogos sem anúncios irritantes!</p>
                                <button className="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-900 font-black rounded-xl text-[10px] uppercase shadow-lg transition-all active:scale-95">
                                    APOIAR AGORA
                                </button>
                            </div>

                            <div className="glass-panel p-5">
                                <h4 className="text-blue-400 text-[10px] font-black uppercase mb-3">Contato</h4>
                                <div className="space-y-3">
                                    <a href="mailto:contato.th047@gmail.com" className="flex items-center gap-3 group">
                                        <div className="p-2 bg-slate-800 rounded-lg text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-400 truncate">contato.th047@gmail.com</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
