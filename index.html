<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600&display=swap" rel="stylesheet">
    <style>
        .cell { transition: all 0.2s ease; border: 2px solid transparent; }
        .fading-piece { opacity: 0.3; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(0.9); opacity: 0.15; } }
        .winner-cell { border-color: #10b981 !important; background-color: rgba(6, 78, 59, 0.5) !important; transform: scale(1.05); }
        
        .float-btn {
            position: fixed;
            top: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            z-index: 40;
        }
        .float-btn:hover { transform: scale(1.05); }
        
        .pix-btn { right: 20px; background: #32bcad; color: white; }
        .lang-btn { left: 20px; background: #475569; color: white; border: 1px solid #64748b; }

        /* Rodapé de Contacto - Subido para não ser tapado pela host */
        .footer-contact-container {
            position: fixed;
            bottom: 80px; /* Aumentado de 20px para 80px para fugir da barra da host */
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            background: rgba(15, 23, 42, 0.9);
            backdrop-blur: md;
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(51, 65, 85, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .contact-label {
            font-family: 'Comfortaa', cursive;
            font-weight: 600;
            color: #FFD700;
            font-size: 0.75rem;
        }
        .contact-email {
            font-family: 'Arial Black', sans-serif;
            color: #FFFACD;
            margin-left: 6px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 pb-32">

    <!-- BOTÃO IDIOMA (FIXO ESQUERDA) -->
    <div class="float-btn lang-btn" onclick="toggleLanguage()">
        <span id="lang-icon">🇺🇸</span>
        <span id="lang-text">English</span>
    </div>

    <!-- BOTÃO APOIAR (FIXO DIREITA) -->
    <div class="float-btn pix-btn" onclick="togglePixModal(true)">
        <span id="label-support-btn">Apoiar 🤑</span>
    </div>

    <!-- RODAPÉ DE CONTATO (POSIÇÃO CORRIGIDA) -->
    <div class="footer-contact-container">
        <span class="contact-label" id="label-contact">Contato Profissional:</span>
        <span class="contact-email">contato.th047@gmail</span>
    </div>

    <!-- JANELA MODAL DO PIX -->
    <div id="pix-modal" class="fixed inset-0 bg-slate-950/90 z-50 hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-800 border-2 border-[#32bcad] rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative text-slate-100">
            <button onclick="togglePixModal(false)" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl">✕</button>
            <h2 class="text-2xl font-black mb-4" id="pix-title">Apoie o Jogo</h2>
            <div class="bg-white p-4 rounded-xl mb-6 aspect-square w-48 mx-auto flex items-center justify-center border-4 border-slate-200">
                <div class="text-center text-slate-500 font-bold">
                    <div class="text-3xl mb-2">🖼️</div>
                    <span class="text-[10px] uppercase" id="pix-qr-label">QR Code Placeholder</span>
                </div>
            </div>
            <p class="text-xs text-slate-400 mb-2 uppercase font-bold tracking-widest" id="pix-key-label">Chave Pix (Copia e Cola)</p>
            <div class="flex gap-2 mb-6">
                <input type="text" id="pix-key" value="11837922985" readonly 
                    class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm w-full text-emerald-400 font-mono focus:outline-none cursor-default select-all text-center">
                <button onclick="copyPix()" id="copy-btn" class="bg-[#32bcad] hover:bg-[#2aa89b] text-white px-4 py-2 rounded-lg font-bold text-sm transition-all active:scale-95">
                    Copiar
                </button>
            </div>
            <button onclick="togglePixModal(false)" class="text-slate-400 hover:text-white text-sm font-bold underline" id="pix-back-btn">Voltar ao Jogo</button>
        </div>
    </div>

    <!-- TABULEIRO PRINCIPAL -->
    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 relative z-10">
        <h1 id="main-title" class="text-3xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 uppercase italic tracking-wider">
            Infinito
        </h1>

        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mb-6">
            <div class="flex justify-between items-center mb-2">
                <div class="text-center">
                    <span class="text-blue-400 font-black text-xl">X</span>
                    <div id="scoreX" class="text-2xl font-bold">0</div>
                </div>
                <div class="text-center flex flex-col items-center">
                    <span id="label-best-of" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Melhor de 5</span>
                    <div id="dots" class="flex gap-1 mt-1">
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                    </div>
                </div>
                <div class="text-center">
                    <span class="text-rose-400 font-black text-xl">O</span>
                    <div id="scoreO" class="text-2xl font-bold">0</div>
                </div>
            </div>
            <div class="flex justify-center items-center mt-4">
                <div id="game-status" class="text-center text-sm font-bold uppercase tracking-widest h-6 flex items-center justify-center w-full">Vez de X</div>
            </div>
        </div>

        <div id="board" class="grid grid-cols-3 gap-3 mb-8 w-full aspect-square max-w-[300px] mx-auto"></div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="resetScore()" id="btn-reset" class="bg-slate-700 hover:bg-rose-900/30 text-slate-300 p-3 rounded-xl font-bold border border-slate-600 transition-all text-sm uppercase">Zerar Pontos</button>
            <button id="next-round-btn" onclick="nextRound()" class="bg-emerald-600 text-white p-3 rounded-xl font-bold border border-emerald-500 transition-all text-sm uppercase hidden">Nova Rodada</button>
            <button id="clear-board-btn" onclick="clearCurrentBoard()" class="bg-slate-700 text-white p-3 rounded-xl font-bold border border-slate-600 transition-all text-sm uppercase">Limpar Mesa</button>
        </div>
    </div>

    <script>
        const translations = {
            pt: {
                supportBtn: "Apoiar 🤑",
                contactLabel: "Contato Profissional:",
                pixTitle: "Apoie o Jogo",
                qrLabel: "QR Code Placeholder",
                pixKeyLabel: "Chave Pix (Copia e Cola)",
                copyBtn: "Copiar",
                backBtn: "Voltar ao Jogo",
                bestOf: "Melhor de 5",
                resetBtn: "Zerar Pontos",
                nextBtn: "Nova Rodada",
                clearBtn: "Limpar Mesa",
                turnX: "Vez de X",
                turnO: "Vez de O",
                winRoundX: "Jogador X venceu a rodada!",
                winRoundO: "Jogador O venceu a rodada!",
                langIcon: "🇺🇸",
                langText: "English",
                copied: "OK!"
            },
            en: {
                supportBtn: "Support 🤑",
                contactLabel: "Professional Contact:",
                pixTitle: "Support the Game",
                qrLabel: "QR Code Placeholder",
                pixKeyLabel: "Pix Key (Copy and Paste)",
                copyBtn: "Copy",
                backBtn: "Back to Game",
                bestOf: "Best of 5",
                resetBtn: "Reset Score",
                nextBtn: "Next Round",
                clearBtn: "Clear Board",
                turnX: "X's Turn",
                turnO: "O's Turn",
                winRoundX: "Player X won the round!",
                winRoundO: "Player O won the round!",
                langIcon: "🇧🇷",
                langText: "Português",
                copied: "Done!"
            }
        };

        let currentLang = 'pt';
        let boardState = Array(9).fill(null), xMoves = [], oMoves = [], isXNext = true, scores = { X: 0, O: 0 }, roundWinner = null;
        
        const boardEl = document.getElementById('board'), statusEl = document.getElementById('game-status');
        const nextBtn = document.getElementById('next-round-btn'), clearBtn = document.getElementById('clear-board-btn');
        const scoreXEl = document.getElementById('scoreX'), scoreOEl = document.getElementById('scoreO');

        function toggleLanguage() {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            const t = translations[currentLang];
            document.getElementById('lang-icon').innerText = t.langIcon;
            document.getElementById('lang-text').innerText = t.langText;
            document.getElementById('label-support-btn').innerText = t.supportBtn;
            document.getElementById('label-contact').innerText = t.contactLabel;
            document.getElementById('pix-title').innerText = t.pixTitle;
            document.getElementById('pix-qr-label').innerText = t.qrLabel;
            document.getElementById('pix-key-label').innerText = t.pixKeyLabel;
            document.getElementById('copy-btn').innerText = t.copyBtn;
            document.getElementById('pix-back-btn').innerText = t.backBtn;
            document.getElementById('label-best-of').innerText = t.bestOf;
            document.getElementById('btn-reset').innerText = t.resetBtn;
            document.getElementById('next-round-btn').innerText = t.nextBtn;
            document.getElementById('clear-board-btn').innerText = t.clearBtn;
            updateUI();
        }

        function togglePixModal(show) {
            document.getElementById('pix-modal').classList.toggle('hidden', !show);
            document.getElementById('pix-modal').classList.toggle('flex', show);
        }

        function copyPix() {
            const pixInput = document.getElementById('pix-key');
            pixInput.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerText;
            btn.innerText = translations[currentLang].copied;
            btn.classList.replace('bg-[#32bcad]', 'bg-emerald-500');
            setTimeout(() => {
                btn.innerText = translations[currentLang].copyBtn;
                btn.classList.replace('bg-emerald-500', 'bg-[#32bcad]');
            }, 1500);
        }

        function initBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.className = 'cell bg-slate-700/50 rounded-xl text-5xl font-black flex items-center justify-center aspect-square';
                cell.onclick = () => handleMove(i);
                boardEl.appendChild(cell);
            }
            updateUI();
        }

        function handleMove(i) {
            if (boardState[i] || roundWinner) return;
            const currentMoves = isXNext ? xMoves : oMoves;
            if (currentMoves.length === 3) boardState[currentMoves.shift()] = null;
            boardState[i] = isXNext ? 'X' : 'O';
            currentMoves.push(i);
            checkRoundWinner();
            if (!roundWinner) isXNext = !isXNext;
            updateUI();
        }

        function checkRoundWinner() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let line of lines) {
                const [a, b, c] = line;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWinner = { player: boardState[a], line };
                    scores[roundWinner.player]++;
                    return;
                }
            }
        }

        function updateUI() {
            const cells = boardEl.children;
            const t = translations[currentLang];
            for (let i = 0; i < 9; i++) {
                cells[i].innerText = boardState[i] || '';
                cells[i].className = 'cell rounded-xl text-5xl font-black flex items-center justify-center aspect-square';
                if (boardState[i] === 'X') cells[i].classList.add('text-blue-400', 'bg-slate-800');
                else if (boardState[i] === 'O') cells[i].classList.add('text-rose-400', 'bg-slate-800');
                else cells[i].classList.add('bg-slate-700/50', 'hover:bg-slate-700');
                const moves = isXNext ? xMoves : oMoves;
                if (!roundWinner && moves.length === 3 && moves[0] === i) cells[i].classList.add('fading-piece');
                if (roundWinner && roundWinner.line.includes(i)) cells[i].classList.add('winner-cell');
            }
            scoreXEl.innerText = scores.X;
            scoreOEl.innerText = scores.O;
            if (roundWinner) {
                statusEl.innerText = roundWinner.player === 'X' ? t.winRoundX : t.winRoundO;
                statusEl.className = `text-center text-sm font-bold uppercase tracking-widest h-6 flex items-center justify-center w-full ${roundWinner.player === 'X' ? 'text-blue-400' : 'text-rose-400'}`;
                nextBtn.classList.remove('hidden'); clearBtn.classList.add('hidden');
            } else {
                statusEl.innerText = isXNext ? t.turnX : t.turnO;
                statusEl.className = `text-center text-sm font-bold uppercase tracking-widest h-6 flex items-center justify-center w-full ${isXNext ? 'text-blue-400' : 'text-rose-400'}`;
                nextBtn.classList.add('hidden'); clearBtn.classList.remove('hidden');
            }
        }

        function nextRound() {
            boardState = Array(9).fill(null); xMoves = []; oMoves = [];
            if (roundWinner) isXNext = roundWinner.player === 'X';
            roundWinner = null; updateUI();
        }

        function clearCurrentBoard() { boardState = Array(9).fill(null); xMoves = []; oMoves = []; updateUI(); }

        function resetScore() {
            scores = { X: 0, O: 0 };
            isXNext = true; nextRound();
        }

        initBoard();
    </script>
</body>
</html>
