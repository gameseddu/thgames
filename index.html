<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito - IA</title>
    <!-- Tailwind CSS para o Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para rodar React direto no browser sem build -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0;
        }
        /* Estilização do slider para consistência visual */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #22d3ee;
            cursor: pointer;
            border: 2px solid #ffffff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Componentes de Ícones manuais para garantir que funcionam sem imports
        const TrophyIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></svg>
        );
        const CpuIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>
        );
        const SettingsIcon = ({ size = 12 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="18" y1="16" x2="22" y2="16"/></svg>
        );
        const CloseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        );
        const HeartIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        );

        function App() {
            // --- ESTADOS DO JOGO ---
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            const [seriesWinner, setSeriesWinner] = useState(null);

            // --- ESTADOS DA IA ---
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 3, speed: 800 });
            const [showAiModal, setShowAiModal] = useState(false);
            const [isAiThinking, setIsAiThinking] = useState(false);

            const difficultyNames = { 1: "Muito Fácil", 2: "Fácil", 3: "Médio", 4: "Difícil", 5: "Imbatível" };

            // --- LÓGICA DE VITÓRIA ---
            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            // --- INTELIGÊNCIA ARTIFICIAL ---
            const getAiMove = useCallback(() => {
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (available.length === 0) return null;
                const mySym = 'O', opSym = 'X';

                if (aiConfig.difficulty === 5) {
                    const minimax = (t, d, isMax) => {
                        const win = checkWinner(t);
                        if (win?.player === mySym) return 10 - d;
                        if (win?.player === opSym) return d - 10;
                        if (t.every(s => s !== null)) return 0;
                        if (isMax) {
                            let best = -Infinity;
                            for (let i = 0; i < 9; i++) if (t[i] === null) { t[i] = mySym; best = Math.max(best, minimax(t, d+1, false)); t[i] = null; }
                            return best;
                        } else {
                            let best = Infinity;
                            for (let i = 0; i < 9; i++) if (t[i] === null) { t[i] = opSym; best = Math.min(best, minimax(t, d+1, true)); t[i] = null; }
                            return best;
                        }
                    };
                    let bM = -1, bS = -Infinity;
                    for (let i of available) {
                        let t = [...board]; t[i] = mySym;
                        let s = minimax(t, 0, false);
                        if (s > bS) { bS = s; bM = i; }
                    }
                    return bM;
                }

                if (aiConfig.difficulty >= 2) {
                    for (let i of available) { const t = [...board]; t[i] = mySym; if (checkWinner(t)) return i; }
                    for (let i of available) { const t = [...board]; t[i] = opSym; if (checkWinner(t)) return i; }
                }
                if (aiConfig.difficulty >= 3 && available.includes(4)) return 4;
                return available[Math.floor(Math.random() * available.length)];
            }, [board, aiConfig, checkWinner]);

            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !seriesWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const move = getAiMove();
                        if (move !== null) handleMove(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, seriesWinner, isAiThinking, getAiMove]);

            // --- MOVIMENTAÇÃO ---
            const handleMove = (i) => {
                if (board[i] || roundWinner || seriesWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const oldestIndex = moves.shift();
                    newBoard[oldestIndex] = null;
                }

                newBoard[i] = symbol;
                const updatedMoves = [...moves, i];
                if (isXNext) setXMoves(updatedMoves); else setOMoves(updatedMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    const nS = { ...scores, [win.player]: scores[win.player] + 1 };
                    setScores(nS);
                    if (nS[win.player] === 3) setSeriesWinner(win.player);
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetRound = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); };
            const resetGame = () => { resetRound(); setScores({ X: 0, O: 0 }); setSeriesWinner(null); setIsXNext(true); };

            return (
                <div className="min-h-screen flex flex-col items-center p-6 bg-[#0f172a]">
                    
                    {/* Botão Superior */}
                    <div className="w-full max-w-md flex justify-end mb-8 mt-2">
                        <button onClick={() => setShowAiModal(true)} className="bg-[#1e293b] border-2 border-cyan-500/20 hover:border-cyan-400 p-3 px-6 rounded-full flex items-center gap-2 transition-all shadow-lg active:scale-95 group">
                            <span className="font-black text-xs text-cyan-400 uppercase tracking-tighter italic">Apoiar Projeto 🤑</span>
                        </button>
                    </div>

                    {/* Card do Jogo */}
                    <div className="max-w-md w-full bg-[#1e293b] rounded-[2.5rem] shadow-2xl p-8 border border-slate-700/50 relative">
                        <h1 className="text-center text-4xl font-black italic tracking-tighter text-cyan-400 mb-8 uppercase">Infinito</h1>

                        {/* Placar */}
                        <div className="grid grid-cols-3 items-center mb-10 bg-[#0f172a]/60 p-6 rounded-[2rem] border border-slate-700/30">
                            <div className="flex flex-col items-center">
                                <span className="text-blue-400 font-black text-2xl">X</span>
                                <span className="text-4xl font-bold">{scores.X}</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 text-center">
                                <span className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">Melhor de 5</span>
                                <div className="flex gap-1.5">
                                    {[1, 2, 3].map(i => (
                                        <div key={i} className={`w-2.5 h-2.5 rounded-full ${i <= scores.X ? 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]' : i <= scores.O ? 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]' : 'bg-slate-800'}`} />
                                    ))}
                                </div>
                            </div>
                            <div className="flex flex-col items-center">
                                <span className="text-rose-400 font-black text-2xl">O</span>
                                <span className="text-4xl font-bold">{scores.O}</span>
                            </div>
                        </div>

                        {/* Feedback Turno */}
                        <div className="mb-6 text-center h-4">
                            {isAiThinking ? (
                                <span className="text-emerald-400 text-[10px] font-black uppercase tracking-widest animate-pulse">IA Analisando...</span>
                            ) : roundWinner ? (
                                <span className="text-emerald-400 text-[10px] font-black uppercase tracking-[0.3em]">Fim da Rodada!</span>
                            ) : (
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Turno do Jogador {isXNext ? 'X' : 'O'}</span>
                            )}
                        </div>

                        {/* Grade */}
                        <div className="grid grid-cols-3 gap-4 mb-10 aspect-square">
                            {board.map((square, i) => {
                                const isFading = !roundWinner && !seriesWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                const isWin = roundWinner && roundWinner.line.includes(i);
                                return (
                                    <button
                                        key={i} onClick={() => handleMove(i)}
                                        disabled={square !== null || roundWinner !== null || isAiThinking}
                                        className={`relative flex items-center justify-center text-5xl font-black rounded-[1.5rem] transition-all duration-300 transform border-2 ${square === null && !roundWinner ? 'bg-[#2d3a4f] border-transparent hover:bg-[#384a63] active:scale-90' : 'bg-[#1e293b] border-slate-700'} ${isWin ? '!bg-emerald-500/20 !border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.2)]' : ''}`}
                                    >
                                        <span className={`${square === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-30 scale-75 blur-[0.5px] animate-pulse' : 'opacity-100'}`}>{square}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Botões */}
                        <div className="flex flex-col gap-3">
                            {roundWinner ? (
                                <button onClick={resetRound} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl">Próxima Rodada</button>
                            ) : (
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={resetGame} className="bg-slate-800 text-slate-400 py-4 rounded-2xl font-bold border border-slate-700 text-[10px] uppercase tracking-widest">Reiniciar</button>
                                    <button onClick={() => {setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]);}} className="bg-slate-800 text-slate-400 py-4 rounded-2xl font-bold border border-slate-700 text-[10px] uppercase tracking-widest">Limpar</button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Contacto */}
                    <div className="w-full max-w-md mt-10">
                        <div className="bg-[#1e293b]/80 border border-slate-700/50 rounded-2xl p-5 flex flex-col items-center justify-center gap-2 shadow-2xl backdrop-blur-sm group text-center">
                            <div className="flex items-center gap-2">
                                <HeartIcon />
                                <span className="text-yellow-500 font-bold text-[10px] uppercase tracking-[0.2em] italic">Contacto Profissional:</span>
                            </div>
                            <span className="text-white font-black text-sm tracking-tight group-hover:text-cyan-400 transition-colors">contato.th047@gmail.com</span>
                        </div>
                        <button onClick={() => setShowAiModal(true)} className="mt-6 mx-auto flex items-center justify-center gap-2 text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] hover:text-cyan-400 transition-colors w-full">
                            <SettingsIcon /> Configuração: {difficultyNames[aiConfig.difficulty]}
                        </button>
                    </div>

                    {/* Modal IA */}
                    {showAiModal && (
                        <div className="fixed inset-0 bg-slate-950/95 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-[#1e293b] border border-slate-700 rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl relative text-slate-100">
                                <button onClick={() => setShowAiModal(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white"><CloseIcon /></button>
                                <div className="flex items-center gap-3 mb-10 border-b border-slate-700 pb-4 text-cyan-400"><CpuIcon /><h2 className="text-lg font-black uppercase italic">Cérebro Artificial</h2></div>
                                <div className="space-y-10">
                                    <div className="flex items-center justify-between p-5 bg-[#0f172a] rounded-[1.5rem] border border-slate-800">
                                        <span className="font-bold text-sm uppercase">Oponente IA</span>
                                        <button onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})} className={`w-14 h-7 rounded-full transition-all relative ${aiConfig.enabled ? 'bg-cyan-600' : 'bg-slate-800'}`}>
                                            <div className={`absolute top-1 w-5 h-5 rounded-full bg-white transition-all ${aiConfig.enabled ? 'left-8' : 'left-1'}`} />
                                        </button>
                                    </div>
                                    <div>
                                        <div className="flex justify-between mb-4"><label className="text-[10px] font-black text-slate-500 uppercase">Dificuldade</label><span className="text-cyan-400 text-xs font-black italic">{difficultyNames[aiConfig.difficulty]}</span></div>
                                        <input type="range" min="1" max="5" value={aiConfig.difficulty} onChange={(e) => setAiConfig({...aiConfig, difficulty: parseInt(e.target.value)})} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
                                    </div>
                                    <button onClick={() => setShowAiModal(false)} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-5 rounded-2xl uppercase text-sm mt-4">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Vencedor Série */}
                    {seriesWinner && (
                        <div className="fixed inset-0 bg-[#0f172a]/98 z-[200] flex items-center justify-center p-6 backdrop-blur-xl">
                            <div className="bg-[#1e293b] border-2 border-yellow-500/50 rounded-[3rem] p-12 max-w-sm w-full text-center shadow-2xl">
                                <TrophyIcon size={96} className="text-yellow-500 mx-auto mb-8" />
                                <h2 className="text-4xl font-black mb-2 text-white uppercase italic">Domínio Total!</h2>
                                <p className="text-slate-400 mb-10 italic">O jogador <span className={seriesWinner === 'X' ? 'text-blue-400' : 'text-rose-400'}>{seriesWinner}</span> é o campeão!</p>
                                <button onClick={resetGame} className="w-full bg-yellow-500 text-slate-950 font-black py-5 rounded-2xl uppercase">Novo Jogo</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
