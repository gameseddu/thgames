<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; /* Impede o scroll */
            position: fixed;
        }

        #root { height: 100%; width: 100%; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        .cell-anim {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            // Estados do Jogo
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            const [seriesWinner, setSeriesWinner] = useState(null);

            // Estados da IA e Configurações
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 100 });
            const [showAiModal, setShowAiModal] = useState(false);
            const [isAiThinking, setIsAiThinking] = useState(false);

            // Verificar Vencedor
            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            // IA Minimax (Imbatível no Nível 5)
            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (tempBoard.every(s => s !== null)) return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            const getAiMove = useCallback(() => {
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (available.length === 0) return null;

                if (aiConfig.difficulty === 5) {
                    let bestScore = -Infinity;
                    let move = -1;
                    for (let i of available) {
                        let tempBoard = [...board];
                        tempBoard[i] = 'O';
                        let score = minimax(tempBoard, 0, false);
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                    return move;
                }

                // Dificuldades menores
                if (aiConfig.difficulty >= 2) {
                    for (let i of available) {
                        const t = [...board]; t[i] = 'O';
                        if (checkWinner(t)) return i;
                    }
                    for (let i of available) {
                        const t = [...board]; t[i] = 'X';
                        if (checkWinner(t)) return i;
                    }
                }
                return available[Math.floor(Math.random() * available.length)];
            }, [board, aiConfig.difficulty, checkWinner, minimax]);

            // Loop da IA
            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !seriesWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const move = getAiMove();
                        if (move !== null) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, seriesWinner, isAiThinking, getAiMove]);

            const handlePlay = (i) => {
                if (board[i] || roundWinner || seriesWinner) return;

                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                // Regra do Infinito: Remove o 1º movimento se já houver 3
                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    const newScores = { ...scores, [win.player]: scores[win.player] + 1 };
                    setScores(newScores);
                    if (newScores[win.player] === 3) setSeriesWinner(win.player);
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetRound = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); setIsXNext(true); };
            const resetGame = () => { resetRound(); setScores({ X: 0, O: 0 }); setSeriesWinner(null); };

            return (
                <div className="flex h-full w-full bg-[#0f172a] text-white">
                    
                    {/* PLACAR LATERAL ESQUERDO */}
                    <div className="w-20 md:w-28 flex flex-col items-center py-12 border-r border-slate-800 bg-[#0f172a] shadow-2xl">
                        <div className="flex flex-col items-center gap-2 mb-10">
                            <span className="text-blue-400 font-black text-xl">X</span>
                            <div className="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center text-2xl font-black border border-blue-500/20 shadow-lg">{scores.X}</div>
                        </div>
                        
                        <div className="flex-1 flex items-center justify-center">
                            <div className="[writing-mode:vertical-lr] rotate-180 text-[10px] font-black uppercase tracking-[0.5em] text-slate-600">Melhor de 5</div>
                        </div>

                        <div className="flex flex-col items-center gap-2 mt-10">
                            <div className="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center text-2xl font-black border border-rose-500/20 shadow-lg">{scores.O}</div>
                            <span className="text-rose-400 font-black text-xl">O</span>
                        </div>
                    </div>

                    {/* ÁREA CENTRAL DO JOGO */}
                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        
                        {/* Botão de Configuração */}
                        <div className="absolute top-6 right-6">
                            <button onClick={() => setShowAiModal(true)} className="p-3 bg-slate-800 rounded-full hover:bg-slate-700 transition-all border border-slate-700">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            </button>
                        </div>

                        <h1 className="text-4xl md:text-5xl font-black italic tracking-tighter text-cyan-400 mb-10 uppercase">Infinito</h1>

                        {/* Status */}
                        <div className="mb-6 h-4">
                            {isAiThinking ? (
                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-emerald-400 animate-pulse">A pensar...</span>
                            ) : roundWinner ? (
                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-400">Rodada Terminada!</span>
                            ) : (
                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500">Vez do {isXNext ? 'X' : 'O'}</span>
                            )}
                        </div>

                        {/* Tabuleiro */}
                        <div className="game-grid">
                            {board.map((cell, i) => {
                                const isOldest = !roundWinner && !seriesWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                const isWin = roundWinner && roundWinner.line.includes(i);
                                return (
                                    <button
                                        key={i} onClick={() => handlePlay(i)}
                                        disabled={cell !== null || roundWinner !== null || isAiThinking}
                                        className={`cell-anim relative flex items-center justify-center text-5xl font-black rounded-3xl border-2 
                                        ${!cell && !roundWinner ? 'bg-slate-800/40 border-transparent hover:bg-slate-800' : 'bg-slate-800 border-slate-700'} 
                                        ${isWin ? '!border-emerald-500 !bg-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.2)]' : ''}`}
                                    >
                                        <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isOldest ? 'opacity-20 blur-[1px]' : 'opacity-100'}`}>
                                            {cell}
                                        </span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Botões de Ação */}
                        <div className="mt-10 w-full max-w-[400px] flex gap-4">
                            {roundWinner ? (
                                <button onClick={resetRound} className="flex-1 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-emerald-900/20">Continuar</button>
                            ) : (
                                <button onClick={resetGame} className="flex-1 py-5 bg-slate-800 hover:bg-slate-700 text-slate-400 border border-slate-700 rounded-2xl font-black uppercase text-[10px] tracking-widest">Reiniciar Tudo</button>
                            )}
                        </div>

                        <div className="mt-8 text-[9px] font-bold text-slate-600 uppercase tracking-widest">contato.th047@gmail.com</div>
                    </div>

                    {/* MODAL DE CONFIGURAÇÕES */}
                    {showAiModal && (
                        <div className="fixed inset-0 bg-slate-950/95 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl relative">
                                <button onClick={() => setShowAiModal(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                </button>
                                
                                <h2 className="text-sm font-black uppercase tracking-widest text-cyan-400 mb-8 flex items-center gap-2">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9v3M20 15v3M1 9v3M1 15v3"/></svg>
                                    Cérebro da IA
                                </h2>

                                <div className="space-y-8">
                                    {/* ON / OFF */}
                                    <div className="flex items-center justify-between bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                                        <span className="text-[10px] font-bold uppercase tracking-widest">Ativar IA</span>
                                        <button onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})} className={`w-12 h-6 rounded-full transition-all relative ${aiConfig.enabled ? 'bg-cyan-600' : 'bg-slate-700'}`}>
                                            <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${aiConfig.enabled ? 'left-7' : 'left-1'}`} />
                                        </button>
                                    </div>

                                    {/* DIFICULDADE */}
                                    <div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-3">Dificuldade</span>
                                        <div className="grid grid-cols-5 gap-1">
                                            {[1,2,3,4,5].map(v => (
                                                <button key={v} onClick={() => setAiConfig({...aiConfig, difficulty: v})} className={`py-3 rounded-xl text-[10px] font-black ${aiConfig.difficulty === v ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-500'}`}>{v}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* VELOCIDADE (BOTÕES) */}
                                    <div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-3">Velocidade da IA</span>
                                        <div className="flex gap-2">
                                            {[
                                                {l: 'Lenta', v: 800},
                                                {l: 'Normal', v: 400},
                                                {l: 'Flash', v: 30}
                                            ].map(s => (
                                                <button key={s.l} onClick={() => setAiConfig({...aiConfig, speed: s.v})} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase ${aiConfig.speed === s.v ? 'bg-white text-slate-900' : 'bg-slate-800 text-slate-500'}`}>{s.l}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={() => setShowAiModal(false)} className="w-full bg-cyan-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-lg shadow-cyan-900/40">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL VENCEDOR FINAL */}
                    {seriesWinner && (
                        <div className="fixed inset-0 bg-slate-950/98 z-[200] flex items-center justify-center p-6 backdrop-blur-xl">
                            <div className="text-center">
                                <div className="text-yellow-500 mb-6 flex justify-center">
                                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></svg>
                                </div>
                                <h2 className="text-4xl font-black italic uppercase tracking-tighter mb-2">Vencedor!</h2>
                                <p className="text-slate-400 text-sm mb-10">O jogador <span className={seriesWinner === 'X' ? 'text-blue-400' : 'text-rose-400'}>{seriesWinner}</span> dominou a série.</p>
                                <button onClick={resetGame} className="w-full max-w-xs bg-white text-slate-900 font-black py-5 rounded-2xl uppercase text-xs tracking-[0.2em]">Novo Torneio</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
