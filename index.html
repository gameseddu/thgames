<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body, html { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            color: white;
        }

        #root { height: 100%; width: 100%; }

        .game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2vh 0;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 85vw;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        .cell-btn {
            background-color: #1e293b;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .cell-btn:active { transform: scale(0.95); }

        .score-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 10px 20px;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 400 });
            const [showAiModal, setShowAiModal] = useState(false);
            const [isAiThinking, setIsAiThinking] = useState(false);

            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (tempBoard.every(s => s !== null)) return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            const getAiMove = useCallback(() => {
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (aiConfig.difficulty === 5) {
                    let bestScore = -Infinity;
                    let move = -1;
                    for (let i of available) {
                        let tempBoard = [...board];
                        tempBoard[i] = 'O';
                        let score = minimax(tempBoard, 0, false);
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                    return move;
                }
                return available[Math.floor(Math.random() * available.length)];
            }, [board, aiConfig.difficulty, minimax]);

            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const move = getAiMove();
                        if (move !== null) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, isAiThinking, getAiMove]);

            const handlePlay = (i) => {
                if (board[i] || roundWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    setScores(prev => ({ ...prev, [win.player]: prev[win.player] + 1 }));
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetTable = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); setIsXNext(true); };
            const resetScores = () => { resetTable(); setScores({ X: 0, O: 0 }); };

            return (
                <div className="game-container">
                    {/* Header com IA Button */}
                    <div className="w-full flex justify-between items-center px-6 max-w-[500px]">
                        <div className="text-xs font-black uppercase tracking-widest text-slate-500">Melhor de 5</div>
                        <button onClick={() => setShowAiModal(true)} className="px-4 py-1.5 bg-cyan-900/30 border border-cyan-500/30 rounded-full text-[10px] font-black text-cyan-400 uppercase tracking-tighter">
                            IA: {aiConfig.difficulty === 5 ? 'Imbatível' : 'Ativa'}
                        </button>
                    </div>

                    {/* Placar Centralizado */}
                    <div className="flex items-center gap-8 my-4">
                        <div className="flex flex-col items-center gap-2">
                            <span className="text-blue-400 font-black text-2xl">X</span>
                            <div className="score-box text-2xl font-black">{scores.X}</div>
                        </div>
                        <div className="text-slate-600 font-bold text-xl">—</div>
                        <div className="flex flex-col items-center gap-2">
                            <span className="text-rose-400 font-black text-2xl">O</span>
                            <div className="score-box text-2xl font-black">{scores.O}</div>
                        </div>
                    </div>

                    <h1 className="text-3xl font-black italic tracking-tighter text-white uppercase opacity-80">Infinito</h1>

                    {/* Status */}
                    <div className="h-6 flex items-center">
                        <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">
                            {isAiThinking ? 'IA a pensar...' : roundWinner ? `Vitória de ${roundWinner.player}!` : `Vez do Jogador ${isXNext ? 'X' : 'O'}`}
                        </span>
                    </div>

                    {/* Tabuleiro */}
                    <div className="game-grid">
                        {board.map((cell, i) => {
                            const isWin = roundWinner?.line.includes(i);
                            const isFading = !roundWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                            return (
                                <button key={i} onClick={() => handlePlay(i)} disabled={cell !== null || roundWinner}
                                    className={`cell-btn ${isWin ? '!bg-emerald-500/20 !border-emerald-500' : ''}`}>
                                    <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-20 blur-[1px]' : ''}`}>
                                        {cell}
                                    </span>
                                </button>
                            );
                        })}
                    </div>

                    {/* Botões de Ação do Modelo Antigo */}
                    <div className="flex gap-4 w-full max-w-[380px] px-4 mt-6">
                        <button onClick={resetScores} className="flex-1 py-4 bg-[#2e3a4e] hover:bg-[#3d4b63] rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">
                            Zerar Pontos
                        </button>
                        <button onClick={resetTable} className="flex-1 py-4 bg-[#2e3a4e] hover:bg-[#3d4b63] rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">
                            Limpar Mesa
                        </button>
                    </div>

                    {/* Rodapé de Contato Profissional */}
                    <div className="mt-6 w-full max-w-[380px] px-4">
                        <div className="border border-slate-800 rounded-2xl py-3 px-6 flex items-center justify-center gap-2 bg-slate-900/50">
                            <span className="text-[#fbbf24] text-[11px] font-bold">Contato Profissional:</span>
                            <span className="text-white text-[11px] font-medium">contato.th047@gmail</span>
                        </div>
                    </div>

                    {/* Modal IA */}
                    {showAiModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] w-full max-w-xs text-center">
                                <h3 className="text-cyan-400 font-black uppercase text-xs mb-6">Configurar Cérebro</h3>
                                <div className="space-y-4">
                                    <button onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})} className="w-full py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase">
                                        IA: {aiConfig.enabled ? 'Ligada' : 'Desligada'}
                                    </button>
                                    <div className="flex gap-2">
                                        {[1, 5].map(lv => (
                                            <button key={lv} onClick={() => setAiConfig({...aiConfig, difficulty: lv})} 
                                                className={`flex-1 py-3 rounded-xl text-[10px] font-bold uppercase ${aiConfig.difficulty === lv ? 'bg-cyan-600' : 'bg-slate-800'}`}>
                                                {lv === 5 ? 'Imbatível' : 'Fácil'}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => setShowAiModal(false)} className="w-full py-4 bg-white text-black rounded-xl text-[10px] font-black uppercase mt-4">Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
