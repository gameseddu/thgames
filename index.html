<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body, html { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0f1e; 
            margin: 0; padding: 0;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1;
        }

        .cell-btn {
            background: #161e2d;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.03);
            /* Garantir tamanho fixo para evitar deformação */
            width: 100%;
            height: 100%;
            min-height: 80px;
            aspect-ratio: 1 / 1;
        }

        .cell-btn:hover:not(:disabled) {
            background: #1e293b;
            transform: scale(1.02);
        }

        .winning-cell {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            color: #10b981 !important;
        }

        input[type=range] {
            accent-color: #3b82f6;
            cursor: pointer;
        }

        /* Estilos do Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            
            // Configuração da IA
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 600 });
            const [isAiThinking, setIsAiThinking] = useState(false);
            
            // Modal de Apoio
            const [showSupport, setShowSupport] = useState(false);
            const [copySuccess, setCopySuccess] = useState(false);

            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            const minimax = useCallback((tempBoard, depth, isMaxing) => {
                const result = checkWinner(tempBoard);
                if (result?.player === 'O') return 10 - depth;
                if (result?.player === 'X') return depth - 10;
                if (tempBoard.every(s => s !== null)) return 0;

                if (isMaxing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'O';
                            let score = minimax(tempBoard, depth + 1, false);
                            tempBoard[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (tempBoard[i] === null) {
                            tempBoard[i] = 'X';
                            let score = minimax(tempBoard, depth + 1, true);
                            tempBoard[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }, [checkWinner]);

            // Jogada da IA
            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                        if (available.length === 0) { setIsAiThinking(false); return; }
                        
                        let move;
                        if (aiConfig.difficulty === 5) {
                            let bestScore = -Infinity;
                            for (let i of available) {
                                let tempBoard = [...board];
                                tempBoard[i] = 'O';
                                let score = minimax(tempBoard, 0, false);
                                if (score > bestScore) { bestScore = score; move = i; }
                            }
                        } else {
                            move = available[Math.floor(Math.random() * available.length)];
                        }
                        if (move !== undefined) handlePlay(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, roundWinner, board, minimax, aiConfig.speed]);

            const handlePlay = (i) => {
                if (board[i] || roundWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const firstMove = moves.shift();
                    newBoard[firstMove] = null;
                }

                newBoard[i] = symbol;
                const newMoves = [...moves, i];

                if (isXNext) setXMoves(newMoves); else setOMoves(newMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    setScores(prev => ({ ...prev, [win.player]: prev[win.player] + 1 }));
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetTable = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); setIsXNext(true); };
            const resetScores = () => { resetTable(); setScores({ X: 0, O: 0 }); };

            const copyPix = () => {
                const pix = "contato.th047@gmail.com";
                const el = document.createElement('textarea');
                el.value = pix;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            return (
                <div className="flex flex-col items-center justify-start min-h-screen py-6 px-4 space-y-6">
                    
                    <div className="text-center">
                        <h1 className="text-3xl md:text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter">
                            Infinito
                        </h1>
                        <p className="text-[9px] uppercase tracking-[0.3em] text-slate-500 font-bold">TIC TAC TOE</p>
                    </div>

                    <div className="flex flex-col lg:flex-row items-center lg:items-start justify-center gap-6 w-full max-w-5xl">
                        
                        {/* Painel Esquerdo: Placar e Controlos da IA */}
                        <div className="w-full max-w-[300px] lg:w-60 space-y-3">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 px-1">Placar</h3>
                            <div className="space-y-2">
                                <div className={`glass-panel p-4 flex items-center justify-between border-l-4 ${isXNext && !roundWinner ? 'border-l-blue-500' : 'border-l-transparent'}`}>
                                    <span className="text-xs font-bold text-blue-400">VOCÊ (X)</span>
                                    <span className="text-xl font-black">{scores.X}</span>
                                </div>
                                <div className={`glass-panel p-4 flex items-center justify-between border-l-4 ${!isXNext && !roundWinner ? 'border-l-rose-500' : 'border-l-transparent'}`}>
                                    <span className="text-xs font-bold text-rose-400">IA (O)</span>
                                    <span className="text-xl font-black">{scores.O}</span>
                                </div>
                            </div>

                            {/* Controlos da IA */}
                            <div className="glass-panel p-4 space-y-4 mt-4">
                                <div className="flex justify-between items-center">
                                    <span className="text-[10px] font-black uppercase text-slate-400">Estado IA</span>
                                    <button 
                                        onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})}
                                        className={`px-3 py-1 rounded-full text-[9px] font-bold uppercase transition-colors ${aiConfig.enabled ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}
                                    >
                                        {aiConfig.enabled ? 'Ligada' : 'Desligada'}
                                    </button>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-black uppercase text-slate-400">Velocidade</span>
                                        <span className="text-[10px] font-mono text-blue-400">{aiConfig.speed}ms</span>
                                    </div>
                                    <input 
                                        type="range" min="100" max="1500" step="100" 
                                        disabled={!aiConfig.enabled}
                                        value={aiConfig.speed} 
                                        onChange={(e) => setAiConfig({...aiConfig, speed: parseInt(e.target.value)})}
                                        className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none disabled:opacity-30"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Centro: Jogo */}
                        <div className="w-full max-w-[360px] space-y-4">
                            <div className="glass-panel p-4 shadow-xl">
                                <div className="game-grid">
                                    {board.map((cell, i) => {
                                        const isWin = roundWinner?.line.includes(i);
                                        const isFading = !roundWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                        return (
                                            <button key={i} onClick={() => handlePlay(i)} disabled={cell !== null || roundWinner || isAiThinking}
                                                className={`cell-btn ${isWin ? 'winning-cell' : ''}`}>
                                                <span className={`${cell === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-20 blur-[1px]' : 'opacity-100'}`}>
                                                    {cell}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={resetTable} className="flex-1 py-3 bg-[#1e293b] hover:bg-slate-700 rounded-xl text-[10px] font-black uppercase transition-all">Limpar Mesa</button>
                                <button onClick={resetScores} className="flex-1 py-3 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 rounded-xl text-[10px] font-black uppercase transition-all border border-rose-500/20">Zerar Pontos</button>
                            </div>
                        </div>

                        {/* Painel Direito: Apoiar e Contato */}
                        <div className="w-full max-w-[300px] lg:w-60 space-y-4">
                            <div className="glass-panel p-5 bg-gradient-to-br from-amber-500/10 to-orange-600/10 border-amber-500/30 text-center">
                                <h4 className="text-amber-400 text-[10px] font-black uppercase tracking-widest mb-2">⭐ Apoiar</h4>
                                <p className="text-[9px] text-slate-400 mb-4">Mantenha o projeto vivo!</p>
                                <button 
                                    onClick={() => setShowSupport(true)}
                                    className="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-900 font-black rounded-xl text-[10px] uppercase shadow-lg transition-all active:scale-95"
                                >
                                    CONTRIBUA AGORA
                                </button>
                            </div>

                            <div className="glass-panel p-5">
                                <h4 className="text-blue-400 text-[10px] font-black uppercase mb-3 px-1">Contato</h4>
                                <div className="space-y-4">
                                    <a href="https://www.instagram.com/rafael.hpk" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 group">
                                        <div className="p-2 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-lg text-white transition-transform group-hover:scale-110">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-300">rafael.hpk</span>
                                    </a>
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-slate-800 rounded-lg text-blue-400">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>
                                        </div>
                                        <span className="text-[9px] font-bold text-slate-400 truncate">contato.th047@gmail.com</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Modal de Apoio Corrigido */}
                    {showSupport && (
                        <div className="modal-overlay" onClick={() => setShowSupport(false)}>
                            <div className="bg-slate-900 border border-slate-700 w-full max-w-xs p-6 rounded-3xl shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowSupport(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                </button>
                                
                                <div className="text-center space-y-5">
                                    <h2 className="text-amber-400 font-black uppercase text-xs tracking-widest">PIX para Apoio</h2>
                                    
                                    {/* Placeholder QR CODE */}
                                    <div className="w-32 h-32 bg-white/5 border-2 border-dashed border-slate-700 rounded-2xl mx-auto flex flex-col items-center justify-center">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-slate-600 mb-2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h2v2H7zM15 7h2v2h-2zM7 15h2v2H7zM15 15h2v2h-2z"/><path d="M11 11h2v2h-2z"/></svg>
                                        <span className="text-[8px] font-bold text-slate-500 uppercase tracking-[0.2em]">QR CODE</span>
                                    </div>

                                    <div className="space-y-2 pt-2">
                                        <p className="text-[9px] text-slate-500 uppercase font-black text-left ml-1">Chave E-mail</p>
                                        <div className="flex items-center gap-2 bg-black/40 p-3 rounded-xl border border-white/5 shadow-inner">
                                            <span className="text-[10px] font-bold text-slate-300 truncate">contato.th047@gmail.com</span>
                                            <button 
                                                onClick={copyPix}
                                                className={`ml-auto px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all shadow-sm ${copySuccess ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white hover:bg-blue-500'}`}
                                            >
                                                {copySuccess ? 'Copiado!' : 'Copiar'}
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-[9px] text-slate-500 italic px-2 leading-relaxed">
                                        Obrigado por ajudar a manter o Jogo da Velha Infinito sem anúncios!
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
