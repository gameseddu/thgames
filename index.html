<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha Infinito - IA</title>
    <!-- Tailwind CSS para o Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Impede o scroll da página */
            position: fixed;
        }

        #root {
            height: 100%;
            width: 100%;
        }

        /* Animação suave para as peças sumindo */
        .piece-fade {
            transition: all 0.5s ease;
        }

        /* Custom scrollbar para o modal se necessário */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // Ícones em SVG inline para evitar dependências externas
        const TrophyIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></svg>
        );
        const CpuIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9v3M20 15v3M1 9v3M1 15v3"/></svg>
        );
        const SettingsIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        );

        function App() {
            // Estados do Jogo
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xMoves, setXMoves] = useState([]); 
            const [oMoves, setOMoves] = useState([]); 
            const [isXNext, setIsXNext] = useState(true);
            const [roundWinner, setRoundWinner] = useState(null);
            const [scores, setScores] = useState({ X: 0, O: 0 });
            const [seriesWinner, setSeriesWinner] = useState(null);

            // Estados da IA
            const [aiConfig, setAiConfig] = useState({ enabled: true, difficulty: 5, speed: 200 });
            const [showAiModal, setShowAiModal] = useState(false);
            const [isAiThinking, setIsAiThinking] = useState(false);

            const difficultyNames = { 1: "Muito Fácil", 2: "Fácil", 3: "Médio", 4: "Difícil", 5: "Imbatível" };

            // Lógica de Vitória
            const checkWinner = useCallback((squares) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a, b, c] of lines) {
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return { player: squares[a], line: [a, b, c] };
                    }
                }
                return null;
            }, []);

            // IA Minimax para Dificuldade 5
            const getAiMove = useCallback(() => {
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (available.length === 0) return null;
                const mySym = 'O', opSym = 'X';

                if (aiConfig.difficulty === 5) {
                    const minimax = (t, d, isMax) => {
                        const win = checkWinner(t);
                        if (win?.player === mySym) return 10 - d;
                        if (win?.player === opSym) return d - 10;
                        if (t.every(s => s !== null)) return 0;

                        if (isMax) {
                            let best = -Infinity;
                            for (let i = 0; i < 9; i++) if (t[i] === null) {
                                t[i] = mySym;
                                best = Math.max(best, minimax(t, d + 1, false));
                                t[i] = null;
                            }
                            return best;
                        } else {
                            let best = Infinity;
                            for (let i = 0; i < 9; i++) if (t[i] === null) {
                                t[i] = opSym;
                                best = Math.min(best, minimax(t, d + 1, true));
                                t[i] = null;
                            }
                            return best;
                        }
                    };
                    let bestMove = -1, bestScore = -Infinity;
                    for (let i of available) {
                        let tempBoard = [...board];
                        tempBoard[i] = mySym;
                        let score = minimax(tempBoard, 0, false);
                        if (score > bestScore) { bestScore = score; bestMove = i; }
                    }
                    return bestMove;
                }

                // Lógica simples para outras dificuldades
                if (aiConfig.difficulty >= 2) {
                    for (let i of available) { const t = [...board]; t[i] = mySym; if (checkWinner(t)) return i; }
                    for (let i of available) { const t = [...board]; t[i] = opSym; if (checkWinner(t)) return i; }
                }
                if (aiConfig.difficulty >= 3 && available.includes(4)) return 4;
                return available[Math.floor(Math.random() * available.length)];
            }, [board, aiConfig.difficulty, checkWinner]);

            // Ciclo da IA
            useEffect(() => {
                if (aiConfig.enabled && !isXNext && !roundWinner && !seriesWinner && !isAiThinking) {
                    setIsAiThinking(true);
                    const timer = setTimeout(() => {
                        const move = getAiMove();
                        if (move !== null) handleMove(move);
                        setIsAiThinking(false);
                    }, aiConfig.speed);
                    return () => clearTimeout(timer);
                }
            }, [isXNext, aiConfig.enabled, aiConfig.speed, roundWinner, seriesWinner, isAiThinking, getAiMove]);

            // Execução de jogada
            const handleMove = (i) => {
                if (board[i] || roundWinner || seriesWinner) return;
                const symbol = isXNext ? 'X' : 'O';
                const moves = isXNext ? [...xMoves] : [...oMoves];
                const newBoard = [...board];

                if (moves.length === 3) {
                    const oldestIndex = moves.shift();
                    newBoard[oldestIndex] = null;
                }

                newBoard[i] = symbol;
                const updatedMoves = [...moves, i];
                if (isXNext) setXMoves(updatedMoves); else setOMoves(updatedMoves);
                setBoard(newBoard);

                const win = checkWinner(newBoard);
                if (win) {
                    setRoundWinner(win);
                    const nS = { ...scores, [win.player]: scores[win.player] + 1 };
                    setScores(nS);
                    if (nS[win.player] === 3) setSeriesWinner(win.player);
                } else {
                    setIsXNext(!isXNext);
                }
            };

            const resetRound = () => { setBoard(Array(9).fill(null)); setXMoves([]); setOMoves([]); setRoundWinner(null); };
            const resetGame = () => { resetRound(); setScores({ X: 0, O: 0 }); setSeriesWinner(null); setIsXNext(true); };

            return (
                <div className="h-full w-full flex bg-[#0f172a] overflow-hidden">
                    
                    {/* PLACAR LATERAL ESQUERDO (VERTICAL) */}
                    <aside className="w-24 md:w-32 border-r border-slate-800 flex flex-col items-center py-10 gap-10 bg-[#0f172a] z-10">
                        <div className="flex flex-col items-center gap-2">
                            <span className="text-blue-400 font-black text-2xl">X</span>
                            <div className="text-4xl font-black bg-[#1e293b] w-16 h-16 flex items-center justify-center rounded-2xl shadow-xl border border-blue-500/20">{scores.X}</div>
                        </div>

                        <div className="h-24 w-[1px] bg-gradient-to-b from-transparent via-slate-700 to-transparent"></div>

                        <div className="flex flex-col items-center gap-2">
                            <div className="text-4xl font-black bg-[#1e293b] w-16 h-16 flex items-center justify-center rounded-2xl shadow-xl border border-rose-500/20">{scores.O}</div>
                            <span className="text-rose-400 font-black text-2xl">O</span>
                        </div>

                        <div className="mt-auto pb-4 flex flex-col items-center gap-4">
                             <button onClick={() => setShowAiModal(true)} className="text-slate-500 hover:text-cyan-400 transition-colors p-2">
                                <SettingsIcon />
                             </button>
                             <div className="[writing-mode:vertical-lr] rotate-180 text-[10px] font-black tracking-[0.4em] text-slate-700 uppercase">
                                Melhor de 5
                             </div>
                        </div>
                    </aside>

                    {/* ÁREA PRINCIPAL DO JOGO */}
                    <main className="flex-1 flex flex-col items-center justify-center relative px-4">
                        
                        {/* Botão Superior Direito */}
                        <div className="absolute top-6 right-6">
                            <button onClick={() => setShowAiModal(true)} className="bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 p-2 px-4 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-cyan-500/20 transition-all active:scale-95">
                                IA: {difficultyNames[aiConfig.difficulty]}
                            </button>
                        </div>

                        <h1 className="text-5xl font-black italic tracking-tighter text-cyan-400 mb-12 uppercase">Infinito</h1>

                        {/* Grade do Jogo */}
                        <div className="w-full max-w-[400px] aspect-square grid grid-cols-3 gap-3 relative">
                            {board.map((square, i) => {
                                const isFading = !roundWinner && !seriesWinner && ((isXNext && xMoves[0] === i && xMoves.length === 3) || (!isXNext && oMoves[0] === i && oMoves.length === 3));
                                const isWin = roundWinner && roundWinner.line.includes(i);
                                return (
                                    <button
                                        key={i} onClick={() => handleMove(i)}
                                        disabled={square !== null || roundWinner !== null || isAiThinking}
                                        className={`relative flex items-center justify-center text-6xl font-black rounded-[1.8rem] transition-all duration-300 transform border-2 
                                        ${square === null && !roundWinner ? 'bg-[#1e293b] border-transparent hover:border-slate-700 active:scale-95' : 'bg-[#1e293b] border-slate-800'} 
                                        ${isWin ? '!bg-emerald-500/20 !border-emerald-500 shadow-[0_0_30px_rgba(16,185,129,0.3)] scale-105 z-10' : ''}`}
                                    >
                                        <span className={`piece-fade ${square === 'X' ? 'text-blue-400' : 'text-rose-400'} ${isFading ? 'opacity-20 scale-75 blur-[1px]' : 'opacity-100'}`}>
                                            {square}
                                        </span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Status e Ações */}
                        <div className="mt-12 w-full max-w-[400px] text-center">
                            <div className="mb-6 h-6 flex items-center justify-center">
                                {isAiThinking ? (
                                    <span className="text-emerald-400 text-[10px] font-black uppercase tracking-[0.4em] animate-pulse">IA a pensar...</span>
                                ) : roundWinner ? (
                                    <span className="text-emerald-400 text-[10px] font-black uppercase tracking-[0.4em]">Vitória de {roundWinner.player}!</span>
                                ) : (
                                    <span className="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em]">Turno: {isXNext ? 'X' : 'O'}</span>
                                )}
                            </div>

                            <div className="flex gap-4">
                                {roundWinner ? (
                                    <button onClick={resetRound} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg transition-all active:scale-95">Próxima Rodada</button>
                                ) : (
                                    <button onClick={resetGame} className="flex-1 bg-slate-800 text-slate-400 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-slate-700 hover:bg-slate-700 transition-all">Reiniciar Jogo</button>
                                )}
                            </div>
                            
                            <div className="mt-8 opacity-40 text-[9px] font-bold uppercase tracking-widest text-slate-500">
                                contato.th047@gmail.com
                            </div>
                        </div>
                    </main>

                    {/* MODAL CONFIGURAÇÃO IA */}
                    {showAiModal && (
                        <div className="fixed inset-0 bg-slate-950/95 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-[#1e293b] border border-slate-700 rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl relative text-slate-100">
                                <button onClick={() => setShowAiModal(false)} className="absolute top-6 right-6 text-slate-500 hover:text-white">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                                
                                <div className="flex items-center gap-3 mb-10 border-b border-slate-700 pb-4 text-cyan-400">
                                    <CpuIcon />
                                    <h2 className="text-lg font-black uppercase italic">Configurações</h2>
                                </div>

                                <div className="space-y-8">
                                    {/* On/Off */}
                                    <div className="flex items-center justify-between p-4 bg-[#0f172a] rounded-2xl border border-slate-800">
                                        <span className="font-bold text-xs uppercase tracking-widest">Oponente IA</span>
                                        <button onClick={() => setAiConfig({...aiConfig, enabled: !aiConfig.enabled})} className={`w-12 h-6 rounded-full transition-all relative ${aiConfig.enabled ? 'bg-cyan-600' : 'bg-slate-800'}`}>
                                            <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-all ${aiConfig.enabled ? 'left-7' : 'left-1'}`} />
                                        </button>
                                    </div>

                                    {/* Dificuldade */}
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Nível de Desafio</label>
                                        <div className="grid grid-cols-5 gap-1">
                                            {[1, 2, 3, 4, 5].map(lv => (
                                                <button 
                                                    key={lv} 
                                                    onClick={() => setAiConfig({...aiConfig, difficulty: lv})}
                                                    className={`py-3 rounded-lg text-xs font-black transition-all ${aiConfig.difficulty === lv ? 'bg-cyan-500 text-slate-950' : 'bg-slate-800 text-slate-500 hover:bg-slate-700'}`}
                                                >
                                                    {lv}
                                                </button>
                                            ))}
                                        </div>
                                        <p className="mt-2 text-center text-cyan-400 text-[10px] font-bold uppercase">{difficultyNames[aiConfig.difficulty]}</p>
                                    </div>

                                    {/* Velocidade (Botões em vez de Slider) */}
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Velocidade da IA</label>
                                        <div className="flex gap-2">
                                            {[
                                                { label: 'Lenta', val: 1000 },
                                                { label: 'Normal', val: 500 },
                                                { label: 'Flash', val: 50 }
                                            ].map(s => (
                                                <button 
                                                    key={s.label}
                                                    onClick={() => setAiConfig({...aiConfig, speed: s.val})}
                                                    className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter transition-all ${aiConfig.speed === s.val ? 'bg-cyan-500 text-slate-950 shadow-lg shadow-cyan-500/20' : 'bg-slate-800 text-slate-500'}`}
                                                >
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={() => setShowAiModal(false)} className="w-full bg-slate-100 text-slate-950 font-black py-4 rounded-2xl uppercase text-xs mt-4 hover:bg-white transition-all">Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL VENCEDOR SÉRIE */}
                    {seriesWinner && (
                        <div className="fixed inset-0 bg-[#0f172a]/95 z-[200] flex items-center justify-center p-6 backdrop-blur-xl">
                            <div className="bg-[#1e293b] border-2 border-yellow-500/50 rounded-[3rem] p-12 max-w-sm w-full text-center shadow-2xl">
                                <div className="text-yellow-500 flex justify-center mb-6 scale-[2]">
                                    <TrophyIcon size={48} />
                                </div>
                                <h2 className="text-4xl font-black mb-2 text-white uppercase italic tracking-tighter">Domínio!</h2>
                                <p className="text-slate-400 mb-10 text-sm font-medium">O jogador <span className={seriesWinner === 'X' ? 'text-blue-400 font-black' : 'text-rose-400 font-black'}>{seriesWinner}</span> venceu a série!</p>
                                <button onClick={resetGame} className="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl transition-all">Novo Torneio</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
