<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Infinito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600&display=swap" rel="stylesheet">
    <style>
        .cell { transition: all 0.2s ease; border: 2px solid transparent; }
        .fading-piece { opacity: 0.3; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(0.9); opacity: 0.15; } }
        .winner-cell { border-color: #10b981 !important; background-color: rgba(6, 78, 59, 0.5) !important; transform: scale(1.05); }
        
        /* Botões flutuantes no topo */
        .float-btn {
            position: fixed;
            top: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            z-index: 50;
        }
        .float-btn:hover { transform: scale(1.05); }
        .pix-btn { right: 20px; background: #32bcad; color: white; }
        .lang-btn { left: 20px; background: #475569; color: white; border: 1px solid #64748b; }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #0f172a;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 0 20px;
        }

        /* Container do Contato com efeito Sticky no fundo */
        .sticky-footer-container {
            position: sticky;
            bottom: 20px; /* Distância do fundo da tela ao rolar */
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 40px; /* Margem extra para permitir a rolagem */
            z-index: 40;
        }

        .footer-contact-box {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 18px;
            border: 1px solid rgba(71, 85, 105, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .contact-label {
            font-family: 'Comfortaa', cursive;
            font-weight: 600;
            color: #FFD700;
            font-size: 0.85rem;
        }

        .contact-email {
            font-family: 'Arial Black', sans-serif;
            color: #FFFACD;
            margin-left: 10px;
            font-size: 0.85rem;
        }

        /* Espaço extra no final da página para o efeito de rolagem ser visível */
        .page-bottom-spacer {
            height: 15vh;
            width: 100%;
        }
    </style>
</head>
<body class="text-slate-100">

    <!-- BOTÕES DE TOPO -->
    <div class="float-btn lang-btn" onclick="toggleLanguage()">
        <span id="lang-icon">🇺🇸</span>
        <span id="lang-text">English</span>
    </div>

    <div class="float-btn pix-btn" onclick="togglePixModal(true)">
        <span id="label-support-btn">Apoiar 🤑</span>
    </div>

    <div class="main-container">
        <!-- CARD DO JOGO -->
        <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 relative z-10">
            <h1 class="text-3xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 uppercase italic tracking-wider">
                Infinito
            </h1>

            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mb-6 text-center">
                <div class="flex justify-between items-center px-4">
                    <div>
                        <span class="text-blue-400 font-black text-xl">X</span>
                        <div id="scoreX" class="text-2xl font-bold">0</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="label-best-of" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Melhor de 5</span>
                        <div class="flex gap-1 mt-1">
                            <div id="dot-1" class="w-2 h-2 rounded-full bg-slate-700 transition-colors"></div>
                            <div id="dot-2" class="w-2 h-2 rounded-full bg-slate-700 transition-colors"></div>
                            <div id="dot-3" class="w-2 h-2 rounded-full bg-slate-700 transition-colors"></div>
                        </div>
                    </div>
                    <div>
                        <span class="text-rose-400 font-black text-xl">O</span>
                        <div id="scoreO" class="text-2xl font-bold">0</div>
                    </div>
                </div>
                <div id="game-status" class="text-sm font-bold uppercase tracking-widest mt-4 text-blue-400">Vez de X</div>
            </div>

            <div id="board" class="grid grid-cols-3 gap-3 mb-8 w-full aspect-square max-w-[300px] mx-auto"></div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="resetScore()" id="btn-reset" class="bg-slate-700 text-slate-300 p-3 rounded-xl font-bold border border-slate-600 text-sm uppercase transition-all hover:bg-slate-600 active:scale-95">Zerar Pontos</button>
                <button id="next-round-btn" onclick="nextRound()" class="bg-emerald-600 text-white p-3 rounded-xl font-bold border border-emerald-500 text-sm uppercase hidden transition-all hover:bg-emerald-500 active:scale-95">Nova Rodada</button>
                <button id="clear-board-btn" onclick="clearCurrentBoard()" class="bg-slate-700 text-white p-3 rounded-xl font-bold border border-slate-600 text-sm uppercase transition-all hover:bg-slate-600 active:scale-95">Limpar Mesa</button>
            </div>
        </div>

        <!-- O CONTATO QUE ACOMPANHA NO FUNDO -->
        <div class="sticky-footer-container">
            <div class="footer-contact-box">
                <span class="contact-label" id="label-contact">Contato Profissional:</span>
                <span class="contact-email">contato.th047@gmail.com</span>
            </div>
        </div>

        <!-- ESPAÇO NO FINAL PARA PERMITIR A ROLAGEM -->
        <div class="page-bottom-spacer"></div>
    </div>

    <!-- MODAL PIX -->
    <div id="pix-modal" class="fixed inset-0 bg-slate-950/90 z-[100] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-800 border-2 border-[#32bcad] rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative">
            <button onclick="togglePixModal(false)" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl">✕</button>
            <h2 class="text-2xl font-black mb-4 uppercase">Apoie o Jogo</h2>
            <div class="bg-white p-4 rounded-xl mb-6 aspect-square w-40 mx-auto flex items-center justify-center border-4 border-slate-200">
                <span class="text-slate-400 font-bold text-xs">QR CODE AQUI</span>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="pix-key" value="11837922985" readonly class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs w-full text-emerald-400 font-mono text-center">
                <button onclick="copyPix()" id="copy-btn" class="bg-[#32bcad] text-white px-4 py-2 rounded-lg font-bold text-xs transition-all active:scale-95">Copiar</button>
            </div>
            <button onclick="togglePixModal(false)" class="text-slate-400 text-xs font-bold underline uppercase">Fechar</button>
        </div>
    </div>

    <script>
        const translations = {
            pt: { support: "Apoiar 🤑", contact: "Contato Profissional:", turnX: "Vez de X", turnO: "Vez de O", next: "Nova Rodada", reset: "Zerar Pontos", clear: "Limpar Mesa", winX: "X venceu!", winO: "O venceu!" },
            en: { support: "Support 🤑", contact: "Professional Contact:", turnX: "X's Turn", turnO: "O's Turn", next: "Next Round", reset: "Reset Score", clear: "Clear Board", winX: "X Won!", winO: "O Won!" }
        };

        let currentLang = 'pt';
        let boardState = Array(9).fill(null), xMoves = [], oMoves = [], isXNext = true, scores = { X: 0, O: 0 }, roundWinner = null;

        function toggleLanguage() {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            const t = translations[currentLang];
            document.getElementById('lang-icon').innerText = currentLang === 'pt' ? '🇺🇸' : '🇧🇷';
            document.getElementById('lang-text').innerText = currentLang === 'pt' ? 'English' : 'Português';
            document.getElementById('label-support-btn').innerText = t.support;
            document.getElementById('label-contact').innerText = t.contact;
            updateUI();
        }

        function togglePixModal(show) {
            document.getElementById('pix-modal').classList.toggle('hidden', !show);
            document.getElementById('pix-modal').classList.toggle('flex', show);
        }

        function copyPix() {
            const el = document.getElementById('pix-key');
            el.select();
            document.execCommand('copy');
            document.getElementById('copy-btn').innerText = "OK!";
            setTimeout(() => document.getElementById('copy-btn').innerText = "Copiar", 1000);
        }

        function initBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const c = document.createElement('button');
                c.className = 'cell bg-slate-700/50 rounded-xl text-5xl font-black flex items-center justify-center aspect-square';
                c.onclick = () => handleMove(i);
                b.appendChild(c);
            }
            updateUI();
        }

        function handleMove(i) {
            if (boardState[i] || roundWinner) return;
            const m = isXNext ? xMoves : oMoves;
            if (m.length === 3) boardState[m.shift()] = null;
            boardState[i] = isXNext ? 'X' : 'O';
            m.push(i);
            checkWinner();
            if (!roundWinner) isXNext = !isXNext;
            updateUI();
        }

        function checkWinner() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let l of lines) {
                const [a, b, c] = l;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWinner = { player: boardState[a], line: l };
                    scores[roundWinner.player]++;
                    return;
                }
            }
        }

        function updateUI() {
            const cells = document.getElementById('board').children;
            const t = translations[currentLang];
            for (let i = 0; i < 9; i++) {
                cells[i].innerText = boardState[i] || '';
                cells[i].className = `cell rounded-xl text-5xl font-black flex items-center justify-center aspect-square ${boardState[i] === 'X' ? 'text-blue-400 bg-slate-800' : boardState[i] === 'O' ? 'text-rose-400 bg-slate-800' : 'bg-slate-700/50'}`;
                const m = isXNext ? xMoves : oMoves;
                if (!roundWinner && m.length === 3 && m[0] === i) cells[i].classList.add('fading-piece');
                if (roundWinner && roundWinner.line.includes(i)) cells[i].classList.add('winner-cell');
            }
            document.getElementById('scoreX').innerText = scores.X;
            document.getElementById('scoreO').innerText = scores.O;
            
            // Atualizar pontos da série
            for(let i=1; i<=3; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = `w-2 h-2 rounded-full ${i <= scores.X ? 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]' : i <= scores.O ? 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.6)]' : 'bg-slate-700'}`;
            }

            const s = document.getElementById('game-status');
            if (roundWinner) {
                s.innerText = roundWinner.player === 'X' ? t.winX : t.winO;
                s.className = `text-sm font-bold uppercase tracking-widest mt-4 ${roundWinner.player === 'X' ? 'text-blue-400' : 'text-rose-400'}`;
                document.getElementById('next-round-btn').classList.remove('hidden');
                document.getElementById('clear-board-btn').classList.add('hidden');
            } else {
                s.innerText = isXNext ? t.turnX : t.turnO;
                s.className = `text-sm font-bold uppercase tracking-widest mt-4 ${isXNext ? 'text-blue-400' : 'text-rose-400'}`;
                document.getElementById('next-round-btn').classList.add('hidden');
                document.getElementById('clear-board-btn').classList.remove('hidden');
            }
        }

        function nextRound() { boardState = Array(9).fill(null); xMoves = []; oMoves = []; roundWinner = null; updateUI(); }
        function clearCurrentBoard() { boardState = Array(9).fill(null); xMoves = []; oMoves = []; updateUI(); }
        function resetScore() { scores = { X: 0, O: 0 }; nextRound(); }

        initBoard();
    </script>
</body>
</html>
